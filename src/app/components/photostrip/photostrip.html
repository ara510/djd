<div class="strip"
     (mouseenter)="pause()"
     (mouseleave)="resume()">

  <!-- Flèche gauche -->
  <button class="strip__arrow strip__arrow--prev"
          (click)="scroll(-1)"
          [class.hidden]="!canPrev()"
          type="button" aria-label="Précédent">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <!-- Bande défilante -->
  <div class="strip__track" #track
       (mousedown)="onDragStart($event)"
       (mousemove)="onDragMove($event)"
       (mouseup)="onDragEnd()"
       (mouseleave)="onDragEnd()">

    <!-- Photos originales -->
    <button *ngFor="let photo of photos; let i = index"
            class="strip__item"
            (click)="openPhoto(i)"
            type="button"
            [attr.aria-label]="'Photo ' + (i + 1)">
      <img [src]="photo" [alt]="'Photo ' + (i + 1)" draggable="false" />
      <span class="strip__item-overlay">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
        </svg>
      </span>
    </button>

    <!-- Clone pour le défilement infini -->
    <button *ngFor="let photo of photos; let i = index"
            class="strip__item"
            (click)="openPhoto(i)"
            type="button"
            [attr.aria-label]="'Photo ' + (i + 1)"
            aria-hidden="true">
      <img [src]="photo" [alt]="" draggable="false" />
      <span class="strip__item-overlay">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
        </svg>
      </span>
    </button>

  </div>

  <!-- Flèche droite -->
  <button class="strip__arrow strip__arrow--next"
          (click)="scroll(1)"
          type="button" aria-label="Suivant">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>

  <!-- Label discret -->
  <span class="strip__label" aria-hidden="true">Photos</span>

</div>

<!-- Lightbox globale -->
<app-gallery></app-gallery>
