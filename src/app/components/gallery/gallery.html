<div class="glx" [class.glx--open]="gallery.isOpen()" role="dialog" aria-modal="true">

  <div class="glx__backdrop" (click)="close()"></div>

  <div class="glx__modal">

    <!-- Header -->
    <div class="glx__header">
      <span class="glx__title">{{ lang.lang() === 'fr' ? 'Galerie' : 'Gallery' }}</span>
      <span class="glx__count">{{ current() + 1 }} / {{ total() }}</span>
      <button class="glx__close" (click)="close()" type="button" aria-label="Fermer">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Carrousel horizontal -->
    <div class="glx__carousel">

      <!-- Flèche gauche -->
      <button class="glx__arrow glx__arrow--prev" (click)="prev()" type="button" aria-label="Précédent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <!-- Piste défilante -->
      <div class="glx__track" #track>
        <div
          *ngFor="let p of photos; let i = index"
          class="glx__slide"
          [class.glx__slide--active]="current() === i"
          (click)="goTo(i)">
          <img [src]="p.src" [alt]="caption(p)" draggable="false" />
        </div>
      </div>

      <!-- Flèche droite -->
      <button class="glx__arrow glx__arrow--next" (click)="next()" type="button" aria-label="Suivant">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

    </div>


  </div>
</div>
