<section id="hero" class="hero">
  <canvas #canvas class="hero__canvas" aria-hidden="true"></canvas>
  <!-- Filigrane logo version claire -->
  <img src="img-3.png" alt="" class="hero__watermark" aria-hidden="true" />

  <div class="container hero__content">
    <p class="label hero__eyebrow">{{ lang.t('hero.eyebrow') }}</p>

    <h1 class="display hero__title">
      {{ lang.t('hero.title1') }}<br>
      {{ lang.t('hero.title2') }}<br>
      <em>{{ lang.t('hero.title3') }}</em>
    </h1>

    <span class="rule"></span>

    <p class="hero__sub">{{ lang.t('hero.sub') }}</p>

    <button class="hero__cta" (click)="scrollToAbout()" type="button">
      {{ lang.t('hero.cta') }}
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 3v10M3 9l5 4 5-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="hero__scroll-hint" aria-hidden="true">
    <span class="hero__scroll-line"></span>
  </div>
</section>
